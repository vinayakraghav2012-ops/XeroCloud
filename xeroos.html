<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>XeroOS Remote</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--bg:#09040f;--purple:#8c2fff;--cyan:#0ff6f6;--text:#ede8f5;--dim:#9b91b8;--danger:#ff3355}
html,body{height:100%;overflow:hidden;background:#000;color:var(--text);font-family:system-ui,sans-serif}
button,input{font:inherit}
#connection-screen{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:22px;background:radial-gradient(circle at 50% 20%,rgba(140,47,255,.18),transparent 34%),var(--bg)}
#connection-screen.hidden,#stream-shell.hidden{display:none}
.logo{font-size:22px;letter-spacing:4px;color:var(--cyan);text-shadow:0 0 18px rgba(15,246,246,.45)}
.title{font-size:54px;line-height:.9;letter-spacing:3px;text-align:center;font-weight:900}
.sub{font-size:11px;letter-spacing:3px;color:var(--dim);text-align:center}
.node-row{width:min(360px,100%);display:flex;gap:8px}
#cs-node-input{min-width:0;flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(140,47,255,.45);color:var(--text);padding:14px 12px;letter-spacing:1px;outline:none}
#cs-connect-btn,#copy-node-btn,.stream-btn,.key-btn{border:1px solid rgba(15,246,246,.35);background:rgba(15,246,246,.08);color:var(--text);cursor:pointer;letter-spacing:2px}
#cs-connect-btn{width:min(360px,100%);padding:15px;background:linear-gradient(135deg,rgba(140,47,255,.35),rgba(15,246,246,.12));border-color:var(--purple)}
#copy-node-btn{padding:0 12px;color:var(--cyan)}
button:disabled{opacity:.55;cursor:not-allowed}
#stream-status-text{min-height:18px;font-size:11px;letter-spacing:2px;color:var(--cyan);text-align:center}
#error-text{min-height:18px;font-size:10px;letter-spacing:1px;color:var(--danger);text-align:center}
#stream-shell{position:fixed;inset:0;display:flex;flex-direction:column;background:#000}
.stream-topbar{height:40px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;background:rgba(9,4,15,.96);border-bottom:1px solid rgba(140,47,255,.35);z-index:5}
.top-left,.top-right{display:flex;align-items:center;gap:10px;min-width:0}
.brand{font-size:11px;letter-spacing:2px;color:var(--cyan)}
#node-label,#latency-label{font-size:9px;letter-spacing:1.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
.stream-btn{padding:6px 9px;font-size:9px}.stream-btn.danger{border-color:rgba(255,51,85,.6);color:var(--danger);background:rgba(255,51,85,.08)}
#video-wrap{position:relative;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden;touch-action:none}
#remote-stream-video{width:100%;height:100%;object-fit:contain;display:block;background:#000}
#video-hint{position:absolute;inset:auto 18px 48%;text-align:center;color:rgba(237,232,245,.45);font-size:11px;letter-spacing:3px;pointer-events:none}
#touch-cursor{position:absolute;width:22px;height:22px;border:2px solid var(--cyan);border-radius:50%;transform:translate(-50%,-50%);opacity:0;pointer-events:none;box-shadow:0 0 14px rgba(15,246,246,.55)}
#touch-cursor.visible{opacity:1}
#stream-stats{position:absolute;right:8px;top:8px;display:none;padding:8px 10px;background:rgba(9,4,15,.86);border:1px solid rgba(140,47,255,.35);font-size:9px;line-height:1.8;color:var(--dim)}
#stream-stats.visible{display:block}
#controller{background:rgba(9,4,15,.98);border-top:1px solid rgba(140,47,255,.35);padding:10px;display:grid;gap:10px}
.key-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}.key-btn{min-height:36px;font-size:10px}
.pad{height:76px;border:1px solid rgba(15,246,246,.25);background:rgba(15,246,246,.04);display:flex;align-items:center;justify-content:center;color:rgba(15,246,246,.35);letter-spacing:3px;touch-action:none}
</style>
</head>
<body>
<div id="connection-screen">
  <div class="logo">XEROCLOUD MESH</div>
  <div class="title">XERO<br>OS</div>
  <div class="sub">REST POLLED REMOTE STREAM CLIENT</div>
  <div class="node-row">
    <input id="cs-node-input" placeholder="ENTER NODE ID" autocomplete="off" autocapitalize="characters" spellcheck="false">
    <button id="copy-node-btn" type="button">COPY</button>
  </div>
  <button id="cs-connect-btn" type="button">CONNECT TO NODE</button>
  <div id="stream-status-text">ENTER HOST NODE ID TO CONNECT</div>
  <div id="error-text"></div>
</div>
<div id="stream-shell" class="hidden">
  <div class="stream-topbar">
    <div class="top-left"><div class="brand">XERO OS</div><div class="dot"></div><div id="node-label">NODE: --</div></div>
    <div class="top-right"><div id="latency-label">-- MS</div><button id="stats-btn" class="stream-btn">STATS</button><button id="end-btn" class="stream-btn danger">END</button></div>
  </div>
  <div id="video-wrap">
    <video id="remote-stream-video" autoplay playsinline muted></video>
    <div id="touch-cursor"></div>
    <div id="video-hint">AWAITING STREAM...</div>
    <div id="stream-stats">
      <div>RES: <span id="stat-res">--</span></div>
      <div>FPS: <span id="stat-fps">--</span></div>
      <div>BITRATE: <span id="stat-bitrate">--</span> KBPS</div>
      <div>ICE: <span id="stat-ice">--</span></div>
    </div>
  </div>
  <div id="controller">
    <div class="pad" id="trackpad">TRACKPAD</div>
    <div class="key-grid">
      <button class="key-btn" data-key="Escape">ESC</button><button class="key-btn" data-key="Tab">TAB</button><button class="key-btn" data-key="Enter">ENTER</button><button class="key-btn" data-key="Backspace">BKSP</button><button class="key-btn" data-key=" ">SPACE</button><button class="key-btn" data-key="Control">CTRL</button>
    </div>
  </div>
</div>
<script>
const API =  process.env.URL;
const SESSION_POLL_MS = 1500;
const STUN_SERVERS = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }, { urls: 'stun:stun2.l.google.com:19302' }] };
let currentNodeId = null, currentRequestId = null, currentClientId = null;
let peerConnection = null, dataChannel = null, sessionPollTimer = null, statsTimer = null, disconnectTimer = null;
let hostIceCount = 0, answerSent = false, endingSession = false;
let nativeWidth = 1920, nativeHeight = 1080, cursorX = 960, cursorY = 540;
const $ = (id) => document.getElementById(id);
function setStatus(text) { $('stream-status-text').textContent = text.toUpperCase(); }
function setError(text) { $('error-text').textContent = text || ''; }
function setConnectDisabled(disabled) { $('cs-connect-btn').disabled = disabled; }
async function apiReq(path, method = 'GET', body = null) {
  const cleanPath = path.startsWith('/api') ? path : `/api${path.startsWith('/') ? path : '/' + path}`;
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + cleanPath, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}
function stopSessionPolling() { if (sessionPollTimer) clearInterval(sessionPollTimer); sessionPollTimer = null; }
function closePeer() { if (peerConnection) peerConnection.close(); peerConnection = null; dataChannel = null; }
function resetSession() {
  stopSessionPolling(); clearInterval(statsTimer); clearTimeout(disconnectTimer); closePeer();
  currentRequestId = null; currentClientId = null; hostIceCount = 0; answerSent = false; endingSession = false;
}
async function connectSignaling(nodeId) {
  resetSession(); currentNodeId = nodeId; setError(''); setConnectDisabled(true); setStatus('creating rest stream request...');
  try {
    const requesterInfo = { email: localStorage.getItem('xc_user_email') || 'Anonymous Client', client: 'xeroos-remote' };
    const data = await apiReq('/stream/request', 'POST', { nodeId, requesterInfo });
    currentRequestId = data.requestId; currentClientId = data.clientId;
    setStatus('request sent - waiting for host acceptance...');
    startSessionPolling();
  } catch (err) {
    setError('REQUEST FAILED: ' + err.message); setConnectDisabled(false);
  }
}
function startSessionPolling() {
  stopSessionPolling();
  const poll = async () => {
    if (!currentRequestId || endingSession) return;
    try { const data = await apiReq(`/stream/${currentRequestId}`); await syncSession(data.request); }
    catch (err) { console.warn('[REST] poll failed:', err.message); }
  };
  poll();
  sessionPollTimer = setInterval(poll, SESSION_POLL_MS);
}
async function syncSession(session) {
  if (!session) return;
  if (session.status === 'pending') { setStatus('waiting for host operator...'); return; }
  if (session.status === 'rejected') { handleStreamEnd('request rejected by host', false); return; }
  if (session.status === 'ended') { handleStreamEnd('host ended the stream', false); return; }
  if (session.status === 'accepted' && !peerConnection) initPeerConnection();
  if (session.status === 'accepted' && !session.offer) { setStatus('access granted - waiting for host offer...'); return; }
  if (session.offer && !answerSent) {
    if (!peerConnection) initPeerConnection();
    try {
      await peerConnection.setRemoteDescription(new RTCSessionDescription(session.offer));
      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);
      await apiReq(`/stream/${currentRequestId}/answer`, 'POST', { answer, clientId: currentClientId });
      answerSent = true; setStatus('answer sent - establishing p2p tunnel...');
    } catch (err) { setError('HANDSHAKE FAILED: ' + err.message); return; }
  }
  if (peerConnection && peerConnection.currentRemoteDescription) {
    const hostIce = session.hostIce || [];
    for (let i = hostIceCount; i < hostIce.length; i++) {
      try { await peerConnection.addIceCandidate(new RTCIceCandidate(hostIce[i])); }
      catch (err) { console.warn('[ICE] host candidate skipped at index', i, err.message); }
    }
    hostIceCount = hostIce.length;
  }
}
function initPeerConnection() {
  closePeer();
  const pc = new RTCPeerConnection(STUN_SERVERS);
  peerConnection = pc;
  pc.ondatachannel = (event) => {
    if (event.channel.label !== 'inputChannel') return;
    dataChannel = event.channel;
    dataChannel.onopen = () => setStatus('input channel active');
    dataChannel.onclose = () => console.log('[DC] input channel closed');
  };
  pc.onicecandidate = (event) => {
    if (!event.candidate || !currentRequestId || !currentClientId) return;
    apiReq(`/stream/${currentRequestId}/ice`, 'POST', { role: 'client', clientId: currentClientId, candidate: event.candidate })
      .catch((err) => console.warn('[ICE] client candidate upload failed:', err.message));
  };
  pc.oniceconnectionstatechange = () => {
    const state = pc.iceConnectionState;
    $('stat-ice').textContent = state.toUpperCase();
    $('node-label').textContent = `NODE: ${currentNodeId} - ${state.toUpperCase()}`;
    if (state === 'connected' || state === 'completed') { clearTimeout(disconnectTimer); setStatus('streaming active'); }
    if (state === 'disconnected') {
      setStatus('signal interrupted - attempting recovery...');
      clearTimeout(disconnectTimer);
      disconnectTimer = setTimeout(() => handleStreamEnd('connection lost'), 12000);
    }
    if (state === 'failed') handleStreamEnd('connection failed');
  };
  pc.ontrack = (event) => {
    const video = $('remote-stream-video');
    if (!video || !event.streams || !event.streams[0]) return;
    video.muted = true; video.playsInline = true; video.autoplay = true; video.srcObject = event.streams[0];
    video.onloadedmetadata = () => {
      nativeWidth = video.videoWidth || 1920; nativeHeight = video.videoHeight || 1080;
      cursorX = nativeWidth / 2; cursorY = nativeHeight / 2;
      $('stat-res').textContent = `${nativeWidth}x${nativeHeight}`;
      $('video-hint').style.display = 'none';
      $('connection-screen').classList.add('hidden'); $('stream-shell').classList.remove('hidden');
      $('node-label').textContent = `NODE: ${currentNodeId}`;
      video.play().catch(() => document.body.addEventListener('touchstart', () => video.play().catch(() => {}), { once: true }));
      startStatsPolling();
    };
  };
}
function sendPacket(packet) {
  if (dataChannel && dataChannel.readyState === 'open') dataChannel.send(JSON.stringify(packet));
}
function handleStreamEnd(reason, notifyServer = true) {
  const requestId = currentRequestId;
  endingSession = true; stopSessionPolling(); clearInterval(statsTimer); clearTimeout(disconnectTimer); closePeer();
  if (notifyServer && requestId) apiReq(`/stream/${requestId}/end`, 'POST', {}).catch(() => {});
  currentRequestId = null; currentClientId = null; answerSent = false; hostIceCount = 0;
  $('stream-shell').classList.add('hidden'); $('connection-screen').classList.remove('hidden');
  setStatus('stream ended: ' + reason); setConnectDisabled(false);
}
function startStatsPolling() {
  clearInterval(statsTimer);
  let lastBytes = 0, lastTime = Date.now();
  statsTimer = setInterval(async () => {
    if (!peerConnection) return;
    const stats = await peerConnection.getStats().catch(() => null);
    if (!stats) return;
    stats.forEach((report) => {
      if (report.type === 'inbound-rtp' && report.kind === 'video') {
        const now = Date.now();
        const seconds = Math.max(0.1, (now - lastTime) / 1000);
        const bytes = Math.max(0, (report.bytesReceived || 0) - lastBytes);
        $('stat-bitrate').textContent = Math.round((bytes * 8) / seconds / 1000);
        $('stat-fps').textContent = Math.round(report.framesPerSecond || 0);
        lastBytes = report.bytesReceived || lastBytes; lastTime = now;
      }
    });
  }, 2000);
}
function mapPoint(clientX, clientY) {
  const rect = $('remote-stream-video').getBoundingClientRect();
  return {
    x: Math.round(Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)) * nativeWidth),
    y: Math.round(Math.max(0, Math.min(1, (clientY - rect.top) / rect.height)) * nativeHeight)
  };
}
const video = $('remote-stream-video'), cursor = $('touch-cursor');
video.addEventListener('touchstart', (e) => { e.preventDefault(); const t = e.touches[0], p = mapPoint(t.clientX, t.clientY); cursorX = p.x; cursorY = p.y; sendPacket({ t: 'mm', x: p.x, y: p.y }); cursor.style.left = t.clientX + 'px'; cursor.style.top = t.clientY + 'px'; cursor.classList.add('visible'); }, { passive: false });
video.addEventListener('touchmove', (e) => { e.preventDefault(); const t = e.touches[0], p = mapPoint(t.clientX, t.clientY); cursorX = p.x; cursorY = p.y; sendPacket({ t: 'mm', x: p.x, y: p.y }); cursor.style.left = t.clientX + 'px'; cursor.style.top = t.clientY + 'px'; }, { passive: false });
video.addEventListener('touchend', (e) => { e.preventDefault(); const t = e.changedTouches[0], p = mapPoint(t.clientX, t.clientY); sendPacket({ t: 'mc', x: p.x, y: p.y, btn: 'left' }); cursor.classList.remove('visible'); }, { passive: false });
let padLast = null;
$('trackpad').addEventListener('touchstart', (e) => { e.preventDefault(); padLast = { x: e.touches[0].clientX, y: e.touches[0].clientY, at: Date.now() }; }, { passive: false });
$('trackpad').addEventListener('touchmove', (e) => { e.preventDefault(); if (!padLast) return; const t = e.touches[0]; cursorX = Math.max(0, Math.min(nativeWidth, cursorX + (t.clientX - padLast.x) * 6)); cursorY = Math.max(0, Math.min(nativeHeight, cursorY + (t.clientY - padLast.y) * 6)); padLast.x = t.clientX; padLast.y = t.clientY; sendPacket({ t: 'mm', x: Math.round(cursorX), y: Math.round(cursorY) }); }, { passive: false });
$('trackpad').addEventListener('touchend', (e) => { e.preventDefault(); if (padLast && Date.now() - padLast.at < 220) sendPacket({ t: 'mc', x: Math.round(cursorX), y: Math.round(cursorY), btn: 'left' }); padLast = null; }, { passive: false });
document.querySelectorAll('.key-btn').forEach((btn) => {
  btn.addEventListener('touchstart', (e) => { e.preventDefault(); sendPacket({ t: 'kd', k: btn.dataset.key }); }, { passive: false });
  btn.addEventListener('touchend', (e) => { e.preventDefault(); sendPacket({ t: 'ku', k: btn.dataset.key }); }, { passive: false });
  btn.addEventListener('mousedown', () => sendPacket({ t: 'kd', k: btn.dataset.key }));
  btn.addEventListener('mouseup', () => sendPacket({ t: 'ku', k: btn.dataset.key }));
});
$('cs-connect-btn').addEventListener('click', () => {
  const nodeId = $('cs-node-input').value.trim().toUpperCase();
  if (!nodeId) { setError('PLEASE ENTER A NODE ID'); return; }
  connectSignaling(nodeId);
});
$('cs-node-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('cs-connect-btn').click(); });
$('copy-node-btn').addEventListener('click', () => { const nodeId = $('cs-node-input').value.trim(); if (nodeId) navigator.clipboard.writeText(nodeId).catch(() => {}); });
$('end-btn').addEventListener('click', () => handleStreamEnd('user disconnected', true));
$('stats-btn').addEventListener('click', () => $('stream-stats').classList.toggle('visible'));
const params = new URLSearchParams(window.location.search);
const nodeParam = params.get('node'), tokenParam = params.get('token'), emailParam = params.get('email');
if (tokenParam) localStorage.setItem('xc_auth_token', tokenParam);
if (emailParam) localStorage.setItem('xc_user_email', emailParam);
if (nodeParam) { $('cs-node-input').value = nodeParam.toUpperCase(); setTimeout(() => connectSignaling(nodeParam.toUpperCase()), 500); }
</script>
</body>
</html>
